<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Va — Storyboard & Animatic</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230b0b0e'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='system-ui,-apple-system,sans-serif' font-weight='700' font-size='20' fill='%237b6cf6'%3EV%3C/text%3E%3Ctext x='20' y='23' text-anchor='middle' font-family='system-ui,-apple-system,sans-serif' font-weight='700' font-size='14' fill='%23e8e8ed'%3Ea%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #0b0b0e;
            --surface: rgba(18, 18, 22, 0.9);
            --surface-hover: rgba(24, 24, 30, 0.95);
            --border: rgba(255, 255, 255, 0.05);
            --border-strong: rgba(255, 255, 255, 0.1);
            --text: #e8e8ed;
            --text-secondary: #8e8e96;
            --text-tertiary: #5c5c66;
            --accent: #7b6cf6;
            --accent-hover: #9388ff;
            --danger: #f4475b;
            --canvas-bg: #131317;
            --radius-lg: 12px;
            --radius-md: 8px;
            --radius-sm: 6px;
            --radius-xs: 4px;
            --font: 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
            --transition-fast: 150ms cubic-bezier(0.22, 0.61, 0.36, 1);
            --transition-smooth: 280ms cubic-bezier(0.22, 0.61, 0.36, 1);
            --transition-slide: 400ms cubic-bezier(0.32, 0.72, 0, 1);
            --shadow-lg: 0 32px 64px rgba(0, 0, 0, 0.6), 0 8px 16px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 16px 32px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* TOP BAR */
        .topbar {
            height: 48px;
            min-height: 48px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            z-index: 200;
            position: relative;
        }
        .topbar-logo {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 1px;
            margin-right: 8px;
            cursor: default;
        }
        .topbar-logo .accent {
            color: var(--accent);
            font-size: 18px;
        }
        .topbar-divider {
            width: 1px;
            height: 20px;
            background: var(--border-strong);
            border-radius: 1px;
        }
        .topbar-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
            letter-spacing: -0.005em;
            height: 30px;
        }
        .topbar-btn svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }
        .topbar-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }
        .topbar-btn.accent {
            color: var(--accent);
        }
        .topbar-btn.accent:hover {
            background: rgba(123, 108, 246, 0.12);
        }
        .topbar-btn.danger {
            color: var(--danger);
        }
        .topbar-btn.danger:hover {
            background: rgba(244, 71, 91, 0.12);
        }
        .topbar-spacer {
            flex: 1;
        }
        .topbar-badge {
            font-size: 10px;
            background: var(--accent);
            color: #fff;
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        .save-indicator {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 6px;
            transition: background var(--transition-fast);
        }
        .save-indicator.saving {
            background: #f59e0b;
            animation: pulse 0.8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* MAIN */
        .main-container {
            display: flex;
            flex: 1;
            min-height: 0;
            position: relative;
        }

        /* LEFT SIDEBAR */
        .sidebar-left {
            width: 56px;
            min-width: 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 6px;
            gap: 2px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            z-index: 150;
        }
        .tool-icon {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            position: relative;
        }
        .tool-icon svg {
            width: 18px;
            height: 18px;
        }
        .tool-icon:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }
        .tool-icon.active {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border-color: var(--border-strong);
        }
        .tool-icon .dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
        }
        .sidebar-divider {
            width: 28px;
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }
        .brush-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 0;
            transition: opacity var(--transition-fast);
        }
        .brush-panel.disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .brush-panel input[type="range"] {
            -webkit-appearance: none;
            writing-mode: vertical-lr;
            direction: rtl;
            height: 64px;
            width: 4px;
            background: var(--border-strong);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .brush-panel input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid var(--bg);
            box-shadow: var(--shadow-sm);
        }
        .brush-panel .size-label {
            font-size: 10px;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--border-strong);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .color-dot:hover {
            border-color: var(--text-secondary);
            transform: scale(1.1);
        }
        .color-dot input {
            position: absolute;
            inset: -10px;
            cursor: pointer;
            opacity: 0;
        }

        /* WORKSPACE */
        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #09090c;
            position: relative;
            overflow: hidden;
            padding: 32px;
        }
        .viewport {
            position: relative;
            width: 100%;
            max-width: 1100px;
            height: 100%;
            max-height: 700px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-strong);
            background: var(--canvas-bg);
        }
        .stage {
            position: absolute;
            inset: 0;
            transition: transform var(--transition-slide), opacity var(--transition-slide);
            will-change: transform, opacity;
        }
        .stage.canvas-stage {
            z-index: 2;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
        }
        .stage.canvas-stage.hidden {
            transform: translateX(-50px);
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }
        .stage.text-stage {
            z-index: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 48px;
            gap: 20px;
            background: #111115;
            overflow-y: auto;
        }
        .stage.text-stage.visible {
            z-index: 2;
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }
        .stage.text-stage.hidden {
            transform: translateX(50px);
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }
        .canvas-wrapper {
            flex: 1;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-xs);
            overflow: hidden;
            margin: 1px;
        }
        .canvas-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        .text-title-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-strong);
            color: var(--text);
            font-size: 24px;
            font-weight: 700;
            font-family: var(--font);
            padding: 12px 0;
            outline: none;
            letter-spacing: -0.02em;
            width: 100%;
        }
        .text-title-input::placeholder {
            color: var(--text-tertiary);
        }
        .text-body-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            font-family: var(--font);
            padding: 0;
            outline: none;
            resize: none;
            flex: 1;
            line-height: 1.7;
            letter-spacing: -0.005em;
        }
        .text-body-input::placeholder {
            color: var(--text-tertiary);
        }

        /* MODE SWITCHER */
        .mode-switcher {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: var(--surface);
            border-radius: 22px;
            padding: 3px;
            border: 1px solid var(--border);
            z-index: 20;
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
        }
        .mode-switch-btn {
            padding: 7px 16px;
            border-radius: 19px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            font-family: var(--font);
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 5px;
            letter-spacing: -0.005em;
        }
        .mode-switch-btn svg {
            width: 14px;
            height: 14px;
        }
        .mode-switch-btn.active {
            background: rgba(255, 255, 255, 0.07);
            color: var(--text);
        }
        .mode-switch-btn:hover:not(.active) {
            color: var(--text);
        }
        .zoom-badge {
            position: absolute;
            bottom: 12px;
            right: 16px;
            background: var(--surface);
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            z-index: 20;
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            pointer-events: none;
        }

        /* VIEWER DOT */
        .viewer-dot {
            position: absolute;
            z-index: 30;
            cursor: grab;
            pointer-events: auto;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter var(--transition-fast), transform var(--transition-fast);
        }
        .viewer-dot svg {
            width: 28px;
            height: 28px;
            color: #fff;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
            pointer-events: none;
        }
        .viewer-dot.closed svg {
            opacity: 0.45;
        }
        .viewer-dot:active {
            cursor: grabbing;
            transform: scale(1.1);
        }
        .viewer-dot:hover {
            transform: scale(1.06);
        }

        /* CANVAS TEXT */
        .canvas-text {
            position: absolute;
            z-index: 25;
            cursor: text;
            font-family: var(--font);
            font-size: 15px;
            color: #e8e8ed;
            outline: none;
            border: 1px solid transparent;
            padding: 3px 7px;
            border-radius: var(--radius-xs);
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            white-space: nowrap;
            min-width: 20px;
            transition: border-color var(--transition-fast);
        }
        .canvas-text:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.75);
        }

        /* RIGHT PANEL */
        .sidebar-right {
            width: 220px;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-left: 1px solid var(--border);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            z-index: 150;
        }
        .slides-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 14px 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-tertiary);
        }
        .add-slide-btn {
            width: 26px;
            height: 26px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }
        .add-slide-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }
        .slides-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .slide-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: var(--radius-md);
            cursor: pointer;
            border: 1px solid transparent;
            transition: all var(--transition-fast);
            position: relative;
        }
        .slide-card:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .slide-card.active {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-strong);
        }
        .slide-card .preview {
            width: 38px;
            height: 28px;
            border-radius: var(--radius-xs);
            background: var(--canvas-bg);
            border: 1px solid var(--border);
            flex-shrink: 0;
            overflow: hidden;
        }
        .slide-card .preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slide-card .info {
            flex: 1;
            min-width: 0;
        }
        .slide-card .info .name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .slide-card .info .index {
            font-size: 10px;
            color: var(--text-tertiary);
        }
        .slide-card .delete-btn {
            opacity: 0;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            width: 20px;
            height: 20px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .slide-card:hover .delete-btn {
            opacity: 0.5;
        }
        .slide-card .delete-btn:hover {
            opacity: 1;
            background: rgba(244, 71, 91, 0.15);
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            pointer-events: none;
        }
        .toast-msg {
            background: var(--surface-hover);
            border: 1px solid var(--border-strong);
            padding: 10px 20px;
            border-radius: 22px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            box-shadow: var(--shadow-md);
            transition: all var(--transition-smooth);
            opacity: 0;
            transform: translateY(20px);
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* SHAPES DROPDOWN */
        .shapes-dropdown {
            position: fixed;
            background: var(--surface-hover);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-lg);
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 1px;
            z-index: 300;
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            box-shadow: var(--shadow-lg);
        }
        .shapes-dropdown.open {
            display: flex;
        }
        .shape-option {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-md);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }
        .shape-option svg {
            width: 18px;
            height: 18px;
        }
        .shape-option:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }

        /* CHEATSHEET MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-box {
            background: var(--surface-hover);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
        }
        .modal-box h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.01em;
        }
        .modal-box .shortcut-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .modal-box .shortcut-row:last-child {
            border-bottom: none;
        }
        .modal-box .key {
            background: rgba(255, 255, 255, 0.06);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .modal-close {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: transparent;
            color: var(--text);
            font-family: var(--font);
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition-fast);
        }
        .modal-close:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="topbar-logo"><span class="accent">V</span>a</div>
        <span class="topbar-badge">β</span>
        <div class="topbar-divider"></div>
        <button class="topbar-btn" onclick="App.undo()" title="Ctrl+Z">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            Отменить
        </button>
        <button class="topbar-btn" onclick="App.redo()" title="Ctrl+Shift+Z">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
            Повторить
        </button>
        <div class="topbar-divider"></div>
        <button class="topbar-btn accent" onclick="App.exportProject()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Сохранить
        </button>
        <button class="topbar-btn" onclick="App.exportPDF()">

    <script>
        (function() {
            // ==================== VA ENGINE ====================
            const App = {};
            window.App = App;

            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);
            const canvas = $('#mainCanvas');
            const ctx = canvas.getContext('2d');
            const canvasWrapper = $('#canvasWrapper');
            const canvasStage = $('#canvasStage');
            const textStage = $('#textStage');
            const viewport = $('#viewport');
            const textTitle = $('#textTitle');
            const textBody = $('#textBody');
            const slidesList = $('#slidesList');
            const shapesDropdown = $('#shapesDropdown');
            const shapesBtn = $('#shapesBtn');
            const brushPanel = $('#brushPanel');
            const brushSlider = $('#brushSizeSlider');
            const brushVal = $('#brushSizeVal');
            const colorPicker = $('#colorPicker');
            const colorDot = $('#colorDot');
            const toastMsg = $('#toastMsg');
            const zoomBadge = $('#zoomBadge');
            const saveDot = $('#saveDot');
            const cheatsheetOverlay = $('#cheatsheetOverlay');
            const modeBtns = $$('.mode-switch-btn');
            const toolBtns = $$('.tool-icon[data-tool]');

            let viewerEl = null;
            let toastTimer = null;
            let saveTimer = null;

            // ---- STATE ----
            const S = {
                slides: [],
                currentIndex: 0,
                tool: 'brush',
                brushSize: 4,
                color: '#e8e8ed',
                mode: 'canvas',
                shapeType: 'rect',
                drawing: false,
                strokePts: [],
                shapeStart: null,
                shapeEnd: null,
                undoStack: [],
                redoStack: [],
                viewer: null,
                zoom: 1,
                panX: 0,
                panY: 0,
                panning: false,
                panStart: null,
                spaceDown: false,
            };

            function currentSlide() {
                if (!S.slides[S.currentIndex]) S.slides[S.currentIndex] = newSlide();
                return S.slides[S.currentIndex];
            }

            function newSlide() {
                return { id: 'sl_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), title: '',
                    body: '', canvasData: null, strokes: [], viewer: null, texts: [] };
            }

            // ---- PERFECT FREEHAND ----
            function smoothStroke(pts) {
                if (pts.length < 2) return pts;
                const w = Math.max(1, Math.floor(pts.length * 0.08));
                const out = [];
                for (let i = 0; i < pts.length; i++) {
                    let sx = 0,
                        sy = 0,
                        sw = 0;
                    for (let j = -w; j <= w; j++) {
                        const k = i + j;
                        if (k >= 0 && k < pts.length) {
                            const g = Math.exp(-(j * j) / (2 * (w / 2.5) * (w / 2.5)));
                            sx += pts[k].x * g;
                            sy += pts[k].y * g;
                            sw += g;
                        }
                    }
                    out.push({ x: sx / sw, y: sy / sw, p: pts[i].p || 0.5 });
                }
                return out;
            }

            function drawStroke(ctx, pts, size, color) {
                if (!pts.length) return;
                if (pts.length === 1) {
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(pts[0].x, pts[0].y, size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    return;
                }
                const s = smoothStroke(pts);
                if (s.length < 2) return;
                ctx.fillStyle = color;
                for (let i = 0; i < s.length - 1; i++) {
                    const a = s[i],
                        b = s[i + 1];
                    const ra = size * (0.3 + a.p * 0.7) / 2;
                    const rb = size * (0.3 + b.p * 0.7) / 2;
                    const dx = b.x - a.x,
                        dy = b.y - a.y;
                    const L = Math.sqrt(dx * dx + dy * dy) || 1;
                    const px = -dy / L,
                        py = dx / L;
                    ctx.beginPath();
                    ctx.moveTo(a.x + px * ra, a.y + py * ra);
                    ctx.lineTo(b.x + px * rb, b.y + py * rb);
                    ctx.lineTo(b.x - px * rb, b.y - py * rb);
                    ctx.lineTo(a.x - px * ra, a.y - py * ra);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(a.x, a.y, ra, 0, Math.PI * 2);
                    ctx.fill();
                }
                const last = s[s.length - 1];
                const lr = size * (0.3 + last.p * 0.7) / 2;
                ctx.beginPath();
                ctx.arc(last.x, last.y, lr, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawShape(ctx, type, a, b, size, color) {
                const x = Math.min(a.x, b.x),
                    y = Math.min(a.y, b.y);
                const w = Math.abs(b.x - a.x),
                    h = Math.abs(b.y - a.y);
                ctx.save();
                ctx.strokeStyle = color;
                ctx.fillStyle = color + '33';
                ctx.lineWidth = size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                switch (type) {
                    case 'rect':
                        ctx.rect(x, y, w, h);
                        break;
                    case 'circle':
                        ctx.ellipse(x + w / 2, y + h / 2, w / 2, h / 2, 0, 0, Math.PI * 2);
                        break;
                    case 'triangle':
                        ctx.moveTo(x + w / 2, y);
                        ctx.lineTo(x + w, y + h);
                        ctx.lineTo(x, y + h);
                        ctx.closePath();
                        break;
                    case 'line':
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        break;
                    case 'star':
                        const cx = x + w / 2,
                            cy = y + h / 2;
                        const or = Math.min(w, h) / 2,
                            ir = or * 0.38;
                        for (let i = 0; i < 10; i++) {
                            const ang = (i * Math.PI) / 5 - Math.PI / 2;
                            const r = i % 2 === 0 ? or : ir;
                            const sx = cx + Math.cos(ang) * r,
                                sy = cy + Math.sin(ang) * r;
                            i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
                        }
                        ctx.closePath();
                        break;
                }
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }

            function getDPR() { return window.devicePixelRatio || 1; }

            function canvasRect() { return canvasWrapper.getBoundingClientRect(); }

            function resizeCanvas() {
                const r = canvasRect();
                const dpr = getDPR();
                const data = canvas.toDataURL();
                canvas.width = r.width * dpr;
                canvas.height = r.height * dpr;
                canvas.style.width = r.width + 'px';
                canvas.style.height = r.height + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr * S.zoom, dpr * S.zoom);
                ctx.translate(S.panX, S.panY);
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(-S.panX / S.zoom, -S.panY / S.zoom, r.width / S.zoom, r.height / S.zoom);
                    ctx.drawImage(img, -S.panX / S.zoom, -S.panY / S.zoom, r.width / S.zoom, r.height / S.zoom);
                    renderTexts();
                };
                img.src = data;
            }

            function applyTransform() {
                const r = canvasRect();
                const dpr = getDPR();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr * S.zoom, dpr * S.zoom);
                ctx.translate(S.panX, S.panY);
            }

            function redrawAll() {
                const r = canvasRect();
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, r.width * getDPR(), r.height * getDPR());
                ctx.restore();
                applyTransform();
                const sl = currentSlide();
                if (sl.strokes) {
                    sl.strokes.forEach(st => {
                        if (st.type === 'stroke') drawStroke(ctx, st.pts, st.size, st.color);
                        else if (st.type === 'shape') drawShape(ctx, st.shape, st.a, st.b, st.size, st
                            .color);
                    });
                }
                renderTexts();
            }

            function saveCanvas() { currentSlide().canvasData = canvas.toDataURL(); }

            function getPos(e) {
                const r = canvasRect();
                const dpr = getDPR();
                return {
                    x: (e.clientX - r.left) / (S.zoom * dpr) - S.panX / S.zoom,
                    y: (e.clientY - r.top) / (S.zoom * dpr) - S.panY / S.zoom,
                    p: e.pressure || 0.5
                };
            }

            // ---- CANVAS TEXT ----
            function addTextAt(pos) {
                const sl = currentSlide();
                const t = { id: 't_' + Date.now(), x: pos.x, y: pos.y, text: 'Текст' };
                sl.texts.push(t);
                createTextEl(t);
                saveState();
            }

            function createTextEl(t) {
                const el = document.createElement('div');
                el.className = 'canvas-text';
                el.dataset.id = t.id;
                el.contentEditable = 'true';
                el.textContent = t.text;
                el.style.left = (t.x + S.panX) * S.zoom + 'px';
                el.style.top = (t.y + S.panY) * S.zoom + 'px';
                el.style.transform = `scale(${S.zoom})`;
                el.style.transformOrigin = 'top left';
                el.addEventListener('input', () => { t.text = el.textContent || 'Текст';
                    saveState(); });
                el.addEventListener('blur', () => { if (!el.textContent.trim()) removeText(t.id); });
                el.addEventListener('pointerdown', e => { e.stopPropagation();
                    S.editingText = t.id; });
                el.addEventListener('keydown', e => { if (e.key === 'Escape') el.blur();
                    e.stopPropagation(); });
                makeDraggable(el, t);
                canvasWrapper.appendChild(el);
            }

            function makeDraggable(el, t) {
                let ox, oy, on = false;
                el.addEventListener('pointerdown', e => {
                    if (S.tool === 'viewer') return;
                    on = true;
                    const er = el.getBoundingClientRect();
                    ox = e.clientX - er.left;
                    oy = e.clientY - er.top;
                    el.setPointerCapture(e.pointerId);
                    el.style.transition = 'none';
                    e.stopPropagation();
                });
                el.addEventListener('pointermove', e => {
                    if (!on) return;
                    const pr = canvasWrapper.getBoundingClientRect();
                    let nx = (e.clientX - pr.left) / S.zoom - S.panX;
                    let ny = (e.clientY - pr.top) / S.zoom - S.panY;
                    nx = Math.max(0, Math.min(nx, pr.width / S.zoom - 10));
                    ny = Math.max(0, Math.min(ny, pr.height / S.zoom - 10));
                    el.style.left = (nx + S.panX) * S.zoom + 'px';
                    el.style.top = (ny + S.panY) * S.zoom + 'px';
                    t.x = nx;
                    t.y = ny;
                    saveState();
                });
                el.addEventListener('pointerup', () => { on = false;
                    el.style.transition = 'border-color 150ms'; });
            }

            function removeText(id) {
                const sl = currentSlide();
                sl.texts = sl.texts.filter(t => t.id !== id);
                const el = canvasWrapper.querySelector(`.canvas-text[data-id="${id}"]`);
                if (el) el.remove();
                saveState();
            }

            function renderTexts() {
                canvasWrapper.querySelectorAll('.canvas-text').forEach(e => e.remove());
                const sl = currentSlide();
                if (sl.texts) sl.texts.forEach(t => createTextEl(t));
            }

            function clearTexts() { canvasWrapper.querySelectorAll('.canvas-text').forEach(e => e.remove()); }

            function updateTextPositions() {
                const sl = currentSlide();
                canvasWrapper.querySelectorAll('.canvas-text').forEach(el => {
                    const id = el.dataset.id;
                    const t = sl.texts.find(tx => tx.id === id);
                    if (t) {
                        el.style.left = (t.x + S.panX) * S.zoom + 'px';
                        el.style.top = (t.y + S.panY) * S.zoom + 'px';
                        el.style.transform = `scale(${S.zoom})`;
                    }
                });
            }

            // ---- VIEWER DOT ----
            function createViewer() {
                if (viewerEl) return;
                viewerEl = document.createElement('div');
                viewerEl.className = 'viewer-dot';
                viewerEl.innerHTML =
                    '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
                viewerEl.title = 'Точка зрителя';
                canvasWrapper.appendChild(viewerEl);
                let ox, oy, on = false,
                    dragged = false;
                viewerEl.addEventListener('pointerdown', e => {
                    if (S.spaceDown || S.tool === 'pan') return;
                    on = true;
                    dragged = false;
                    const r = viewerEl.getBoundingClientRect();
                    ox = e.clientX - r.left;
                    oy = e.clientY - r.top;
                    viewerEl.setPointerCapture(e.pointerId);
                    viewerEl.style.transition = 'none';
                    e.stopPropagation();
                });
                viewerEl.addEventListener('pointermove', e => {
                    if (!on) return;
                    dragged = true;
                    const pr = canvasWrapper.getBoundingClientRect();
                    let nx = (e.clientX - pr.left) / S.zoom - S.panX;
                    let ny = (e.clientY - pr.top) / S.zoom - S.panY;
                    nx = Math.max(0, Math.min(nx, pr.width / S.zoom - 32 / S.zoom));
                    ny = Math.max(0, Math.min(ny, pr.height / S.zoom - 32 / S.zoom));
                    viewerEl.style.left = (nx + S.panX) * S.zoom + 'px';
                    viewerEl.style.top = (ny + S.panY) * S.zoom + 'px';
                    viewerEl.style.transform = `scale(${S.zoom})`;
                    S.viewer = { x: (nx / (pr.width / S.zoom)) * 100, y: (ny / (pr.height / S.zoom)) * 100,
                        closed: !!S.viewer?.closed };
                    currentSlide().viewer = S.viewer;
                    saveState();
                });
                viewerEl.addEventListener('pointerup', e => {
                    on = false;
                    viewerEl.style.transition = 'filter 150ms, transform 150ms';
                    if (!dragged && e.detail === 1) {
                        S.viewer = { ...(S.viewer || { x: 50, y: 50 }), closed: !S.viewer?.closed };
                        updateViewerLook();
                        currentSlide().viewer = S.viewer;
                        saveState();
                    }
                });
            }

            function placeViewer(pos) {
                createViewer();
                const pr = canvasWrapper.getBoundingClientRect();
                const nx = Math.max(0, Math.min(pos.x, pr.width / S.zoom - 32 / S.zoom));
                const ny = Math.max(0, Math.min(pos.y, pr.height / S.zoom - 32 / S.zoom));
                viewerEl.style.left = (nx + S.panX) * S.zoom + 'px';
                viewerEl.style.top = (ny + S.panY) * S.zoom + 'px';
                viewerEl.style.transform = `scale(${S.zoom})`;
                S.viewer = { x: (nx / (pr.width / S.zoom)) * 100, y: (ny / (pr.height / S.zoom)) * 100, closed: false };
                updateViewerLook();
                currentSlide().viewer = S.viewer;
                saveState();
            }

            function updateViewerPos() {
                if (!viewerEl || !S.viewer) return;
                const pr = canvasWrapper.getBoundingClientRect();
                viewerEl.style.left = ((S.viewer.x / 100) * (pr.width / S.zoom) + S.panX) * S.zoom + 'px';
                viewerEl.style.top = ((S.viewer.y / 100) * (pr.height / S.zoom) + S.panY) * S.zoom + 'px';
                viewerEl.style.transform = `scale(${S.zoom})`;
            }

            function updateViewerLook() {
                if (!viewerEl) return;
                viewerEl.classList.toggle('closed', !!S.viewer?.closed);
                viewerEl.innerHTML = S.viewer?.closed ?
                    '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/></svg>' :
                    '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            }

            function removeViewer() {
                if (viewerEl) { viewerEl.remove();
                    viewerEl = null; }
                S.viewer = null;
                if (currentSlide()) currentSlide().viewer = null;
            }

            // ---- PAN ----
            function startPan(e) {
                if (!S.spaceDown && S.tool !== 'pan') return;
                S.panning = true;
                S.panStart = { x: e.clientX - S.panX * S.zoom * getDPR(), y: e.clientY - S.panY * S.zoom * getDPR() };
                canvas.style.cursor = 'grab';
            }

            function movePan(e) {
                if (!S.panning) return;
                const dpr = getDPR();
                S.panX = (e.clientX - S.panStart.x) / (S.zoom * dpr);
                S.panY = (e.clientY - S.panStart.y) / (S.zoom * dpr);
                resizeCanvas();
                updateViewerPos();
                updateTextPositions();
            }

            function endPan() {
                S.panning = false;
                S.panStart = null;
                updateCursor();
            }

            // ---- ZOOM ----
            function setZoom(z) {
                S.zoom = Math.max(0.1, Math.min(5, z));
                S.zoom = Math.round(S.zoom * 100) / 100;
                zoomBadge.textContent = Math.round(S.zoom * 100) + '%';
                resizeCanvas();
                updateViewerPos();
                updateTextPositions();
            }

            // ---- UNDO ----
            function snapshot() {
                const sl = currentSlide();
                return { strokes: JSON.parse(JSON.stringify(sl.strokes)), texts: JSON.parse(JSON.stringify(sl.texts)),
                    viewer: sl.viewer ? { ...sl.viewer } : null, canvasData: canvas.toDataURL() };
            }

            function pushUndo() { S.undoStack.push(snapshot()); if (S.undoStack.length > 60) S.undoStack.shift();
                S.redoStack = []; }

            function applySnap(snap) {
                const sl = currentSlide();
                sl.strokes = JSON.parse(JSON.stringify(snap.strokes));
                sl.texts = JSON.parse(JSON.stringify(snap.texts));
                sl.viewer = snap.viewer ? { ...snap.viewer } : null;
                const img = new Image();
                img.onload = () => {
                    const r = canvasRect();
                    ctx.clearRect(0, 0, r.width, r.height);
                    ctx.drawImage(img, 0, 0, r.width, r.height);
                    clearTexts();
                    if (sl.texts) sl.texts.forEach(t => createTextEl(t));
                };
                img.src = snap.canvasData;
                removeViewer();
                if (sl.viewer) { S.viewer = { ...sl.viewer };
                    createViewer();
                    updateViewerPos();
                    updateViewerLook(); }
            }

            App.undo = () => { if (!S.undoStack.length) return;
                S.redoStack.push(snapshot());
                applySnap(S.undoStack.pop());
                saveCanvas();
                saveToDisk();
                renderSlides();
                toast('Отмена'); };
            App.redo = () => { if (!S.redoStack.length) return;
                S.undoStack.push(snapshot());
                applySnap(S.redoStack.pop());
                saveCanvas();
                saveToDisk();
                renderSlides();
                toast('Повтор'); };

            // ---- SLIDES ----
            App.addSlide = () => { S.slides.push(newSlide());
                S.currentIndex = S.slides.length - 1;
                loadSlide(S.currentIndex);
                renderSlides();
                saveToDisk();
                toast('Слайд добавлен'); };
            App.duplicateSlide = () => {
                const orig = currentSlide();
                const dup = JSON.parse(JSON.stringify(orig));
                dup.id = 'sl_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
                dup.title = orig.title + ' (копия)';
                S.slides.splice(S.currentIndex + 1, 0, dup);
                S.currentIndex++;
                loadSlide(S.currentIndex);
                renderSlides();
                saveToDisk();
                toast('Слайд дублирован');
            };
            App.clearSlide = () => {
                if (!confirm('Стереть всё на текущем слайде?')) return;
                pushUndo();
                const sl = currentSlide();
                sl.strokes = [];
                sl.texts = [];
                sl.canvasData = null;
                sl.viewer = null;
                removeViewer();
                clearTexts();
                const r = canvasRect();
                ctx.clearRect(0, 0, r.width, r.height);
                saveCanvas();
                saveToDisk();
                renderSlides();
                toast('Слайд очищен');
            };

            function deleteSlide(i) {
                if (S.slides.length <= 1) return toast('Нельзя удалить последний слайд');
                S.slides.splice(i, 1);
                if (S.currentIndex >= S.slides.length) S.currentIndex = S.slides.length - 1;
                loadSlide(S.currentIndex);
                renderSlides();
                saveToDisk();
                toast('Слайд удалён');
            }
            window._deleteSlide = deleteSlide;

            function selectSlide(i) { if (i === S.currentIndex) return;
                S.currentIndex = i;
                loadSlide(i);
                renderSlides(); }

            function loadSlide(i) {
                S.undoStack = [];
                S.redoStack = [];
                S.drawing = false;
                S.strokePts = [];
                S.shapeStart = S.shapeEnd = null;
                const sl = S.slides[i];
                if (!sl) return;
                textTitle.value = sl.title || '';
                textBody.value = sl.body || '';
                removeViewer();
                clearTexts();
                if (sl.canvasData) {
                    const img = new Image();
                    img.onload = () => { const r = canvasRect();
                        ctx.clearRect(0, 0, r.width, r.height);
                        ctx.drawImage(img, 0, 0, r.width, r.height); if (sl.texts) sl.texts.forEach(t =>
                            createTextEl(t)); };
                    img.src = sl.canvasData;
                } else { const r = canvasRect();
                    ctx.clearRect(0, 0, r.width, r.height); if (sl.strokes?.length) { redrawAll();
                        saveCanvas(); } }
                if (sl.viewer) { S.viewer = { ...sl.viewer };
                    createViewer();
                    updateViewerPos();
                    updateViewerLook(); }
            }

            function renderSlides() {
                slidesList.innerHTML = '';
                S.slides.forEach((sl, i) => {
                    const card = document.createElement('div');
                    card.className = 'slide-card' + (i === S.currentIndex ? ' active' : '');
                    card.onclick = (e) => { if (!e.target.closest('.delete-btn')) selectSlide(i); };
                    card.innerHTML = `
                <div class="preview">${sl.canvasData ? `<img src="${sl.canvasData}">` : ''}</div>
                <div class="info"><div class="name">${esc(sl.title || 'Без названия')}</div><div class="index">Слайд ${i+1}</div></div>
                <button class="delete-btn" onclick="event.stopPropagation();window._deleteSlide(${i})">×</button>`;
                    slidesList.appendChild(card);
                });
            }

            function esc(s) { const d = document.createElement('div');
                d.textContent = s; return d.innerHTML; }

            // ---- MODE ----
            function setMode(m) {
                S.mode = m;
                S.drawing = false;
                S.strokePts = [];
                S.shapeStart = S.shapeEnd = null;
                modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === m));
                if (m === 'canvas') { canvasStage.classList.remove('hidden');
                    textStage.classList.remove('visible');
                    textStage.classList.add('hidden');
                    setTimeout(resizeCanvas, 50); } else { canvasStage.classList.add('hidden');
                    textStage.classList.remove('hidden');
                    textStage.classList.add('visible');
                    textTitle.focus(); }
                updateCursor();
            }

            // ---- TOOLS ----
            function setTool(t) {
                S.tool = t;
                S.shapeType = 'rect';
                shapesDropdown.classList.remove('open');
                toolBtns.forEach(b => b.classList.toggle('active', b.dataset.tool === t));
                shapesBtn.classList.toggle('active', t === 'shapes');
                brushPanel.classList.toggle('disabled', t !== 'brush' && t !== 'eraser');
                colorDot.style.opacity = (t === 'brush' || t === 'shapes') ? '1' : '0.3';
                colorDot.style.pointerEvents = (t === 'brush' || t === 'shapes') ? 'auto' : 'none';
                updateCursor();
            }

            function updateCursor() {
                if (S.mode !== 'canvas') { canvas.style.cursor = 'default'; return; }
                if (S.spaceDown || S.tool === 'pan') { canvas.style.cursor = S.panning ? 'grabbing' : 'grab'; return; }
                const map = { brush: 'crosshair', eraser: 'cell', fill: 'crosshair', shapes: 'crosshair', text: 'text',
                    viewer: 'default' };
                canvas.style.cursor = map[S.tool] || 'crosshair';
            }

            // ---- CANVAS EVENTS ----
            canvas.addEventListener('pointerdown', e => {
                if (S.mode !== 'canvas') return;
                if (S.spaceDown || S.tool === 'pan') { startPan(e); return; }
                const pos = getPos(e);
                if (S.tool === 'viewer') { placeViewer(pos); return; }
                if (S.tool === 'fill') { pushUndo();
                    floodFill(Math.round(pos.x), Math.round(pos.y), S.color);
                    saveCanvas();
                    saveToDisk(); return; }
                if (S.tool === 'text') { pushUndo();
                    addTextAt(pos);
                    saveCanvas();
                    saveToDisk(); return; }
                if (S.tool === 'shapes') { S.shapeStart = pos;
                    S.shapeEnd = pos;
                    S.drawing = true;
                    pushUndo(); return; }
                S.drawing = true;
                S.strokePts = [pos];
                pushUndo();
                const clr = S.tool === 'eraser' ? '#131317' : S.color;
                const sz = S.tool === 'eraser' ? S.brushSize * 2.5 : S.brushSize;
                ctx.fillStyle = clr;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, sz / 2, 0, Math.PI * 2);
                ctx.fill();
            });

            canvas.addEventListener('pointermove', e => {
                if (S.panning) { movePan(e); return; }
                if (!S.drawing || S.mode !== 'canvas') return;
                const pos = getPos(e);
                if (S.tool === 'shapes' && S.shapeStart) { S.shapeEnd = pos;
                    redrawAll();
                    drawShape(ctx, S.shapeType, S.shapeStart, S.shapeEnd, S.brushSize, S.color); return; }
                S.strokePts.push(pos);
                const clr = S.tool === 'eraser' ? '#131317' : S.color;
                const sz = S.tool === 'eraser' ? S.brushSize * 2.5 : S.brushSize;
                drawStroke(ctx, S.strokePts.slice(-2), sz, clr);
            });

            canvas.addEventListener('pointerup', () => {
                if (S.panning) { endPan(); return; }
                if (!S.drawing || S.mode !== 'canvas') return;
                S.drawing = false;
                if (S.tool === 'shapes' && S.shapeStart && S.shapeEnd) {
                    currentSlide().strokes.push({ type: 'shape', shape: S.shapeType, a: S.shapeStart, b: S.shapeEnd,
                        size: S.brushSize, color: S.color });
                    S.shapeStart = S.shapeEnd = null;
                    redrawAll();
                    saveCanvas();
                    saveToDisk();
                    renderSlides();
                    return;
                }
                if (S.strokePts.length) {
                    const clr = S.tool === 'eraser' ? '#131317' : S.color;
                    const sz = S.tool === 'eraser' ? S.brushSize * 2.5 : S.brushSize;
                    currentSlide().strokes.push({ type: 'stroke', pts: [...S.strokePts], size: sz, color: clr });
                    S.strokePts = [];
                    saveCanvas();
                    saveToDisk();
                    renderSlides();
                }
            });
            canvas.addEventListener('pointerleave', () => { if (S.drawing) canvas.dispatchEvent(new PointerEvent(
                    'pointerup')); if (S.panning) endPan(); });

            function floodFill(sx, sy, hex) {
                const r = canvasRect();
                const dpr = getDPR();
                const w = Math.round(r.width),
                    h = Math.round(r.height);
                if (sx < 0 || sx >= w / S.zoom || sy < 0 || sy >= h / S.zoom) return;
                const img = ctx.getImageData(0, 0, w * dpr, h * dpr);
                const d = img.data;
                const px = Math.round((sx + S.panX / S.zoom) * S.zoom * dpr);
                const py = Math.round((sy + S.panY / S.zoom) * S.zoom * dpr);
                const ti = (py * w * dpr + px) * 4;
                if (ti < 0 || ti >= d.length) return;
                const tr = d[ti],
                    tg = d[ti + 1],
                    tb = d[ti + 2],
                    ta = d[ti + 3];
                const fc = hexToRgb(hex);
                if (Math.abs(tr - fc[0]) < 2 && Math.abs(tg - fc[1]) < 2 && Math.abs(tb - fc[2]) < 2 && ta === 255)
                return;
                const stack = [
                    [px, py]
                ];
                const vis = new Uint8Array(w * dpr * h * dpr);
                const tol = 6;
                while (stack.length) {
                    const [x, y] = stack.pop();
                    if (x < 0 || x >= w * dpr || y < 0 || y >= h * dpr) continue;
                    const idx = y * w * dpr + x;
                    if (vis[idx]) continue;
                    const pi = idx * 4;
                    if (Math.abs(d[pi] - tr) > tol || Math.abs(d[pi + 1] - tg) > tol || Math.abs(d[pi + 2] - tb) >
                        tol || d[pi + 3] !== ta) continue;
                    vis[idx] = 1;
                    d[pi] = fc[0];
                    d[pi + 1] = fc[1];
                    d[pi + 2] = fc[2];
                    d[pi + 3] = 255;
                    stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
                }
                ctx.putImageData(img, 0, 0);
                currentSlide().strokes.push({ type: 'fill', color: hex, x: sx, y: sy });
            }

            function hexToRgb(h) { const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h); return m ? [parseInt(m[
                    1], 16), parseInt(m[2], 16), parseInt(m[3], 16)] : [232, 232, 237]; }

            // ---- STORAGE ----
            function saveToDisk() {
                try { localStorage.setItem('va_project', JSON.stringify({ slides: S.slides, index: S.currentIndex }));
                    markSaved(); } catch (e) {}
            }

            function loadFromDisk() {
                try { const raw = localStorage.getItem('va_project'); if (raw) { const d = JSON.parse(raw);
                        S.slides = d.slides || [];
                        S.currentIndex = d.index || 0; } } catch (e) {}
            }

            function saveState() { saveCanvas();
                saveToDisk(); }
            const markSaving = () => { saveDot.classList.add('saving');
                clearTimeout(saveTimer);
                saveTimer = setTimeout(markSaved, 600); };
            const markSaved = () => { saveDot.classList.remove('saving'); };

            // ---- EXPORT ----
            App.exportProject = () => {
                const blob = new Blob([JSON.stringify({ version: '1.0', app: 'Va', slides: S.slides }, null, 2)], {
                    type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'project.favcsproject';
                a.click();
                URL.revokeObjectURL(a.href);
                toast('Проект сохранён');
            };
            App.exportPNG = () => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL('image/png');
                a.download = 'slide_' + (S.currentIndex + 1) + '.png';
                a.click();
                toast('PNG экспортирован');
            };
            App.exportPDF = () => {
                toast('Генерация PDF...');
                const ifr = document.createElement('iframe');
                ifr.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1100px;height:800px;';
                document.body.appendChild(ifr);
                const doc = ifr.contentDocument;
                doc.open();
                doc.write(
                    '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap");body{font-family:Inter,sans-serif;background:#fff;color:#111;margin:0;padding:40px;}.page{page-break-after:always;padding:30px 0;border-bottom:1px dashed #ccc;}.page:last-child{page-break-after:auto;border:none;}.title{font-size:24px;font-weight:700;margin-bottom:16px;color:#1a1a2e;}.content{display:flex;gap:24px;}.img-wrap{flex:1;max-width:60%;border-radius:8px;border:1px solid #ddd;overflow:hidden;}.img-wrap img{width:100%;}.text{flex:1;font-size:14px;line-height:1.7;white-space:pre-wrap;}.badge{display:inline-block;background:#7b6cf6;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:8px;}</style></head><body>'
                    );
                S.slides.forEach((sl, i) => {
                    doc.write(
                        `<div class="page"><div class="title">${esc(sl.title||'Слайд '+(i+1))}${sl.viewer?'<span class="badge">точка зрителя</span>':''}</div><div class="content">`
                        );
                    doc.write(sl.canvasData ?
                        `<div class="img-wrap"><img src="${sl.canvasData}"></div>` :
                        '<div class="img-wrap" style="background:#f5f5f5;height:300px;display:flex;align-items:center;justify-content:center;color:#aaa;">Пустой канвас</div>'
                        );
                    doc.write(`<div class="text">${esc(sl.body||'')}</div></div></div>`);
                });
                doc.write('</body></html>');
                doc.close();
                ifr.onload = () => { setTimeout(() => { ifr.contentWindow.print();
                        setTimeout(() => ifr.remove(), 1000); }, 400); };
            };
            App.clearAll = () => {
                if (!confirm('Удалить все слайды?')) return;
                S.slides = [newSlide()];
                S.currentIndex = 0;
                S.undoStack = [];
                S.redoStack = [];
                S.zoom = 1;
                S.panX = 0;
                S.panY = 0;
                zoomBadge.textContent = '100%';
                removeViewer();
                clearTexts();
                loadSlide(0);
                renderSlides();
                saveToDisk();
                toast('Очищено');
            };

            // ---- CHEATSHEET ----
            App.showCheatsheet = () => { cheatsheetOverlay.classList.add('open'); };
            App.hideCheatsheet = (e) => { if (e && e.target !== cheatsheetOverlay) return;
                cheatsheetOverlay.classList.remove('open'); };

            // ---- TOAST ----
            function toast(msg) { toastMsg.textContent = msg;
                toastMsg.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => toastMsg.classList.remove('show'), 1800); }

            // ---- KEYBOARD ----
            document.addEventListener('keydown', e => {
                if (e.ctrlKey && e.key === 'z' && !e.shiftKey) { e.preventDefault();
                    App.undo(); }
                if (e.ctrlKey && (e.key === 'Z' || (e.shiftKey && e.key === 'z'))) { e.preventDefault();
                    App.redo(); }
                if (e.ctrlKey && e.key === 'd') { e.preventDefault();
                    App.duplicateSlide(); }
                if (e.ctrlKey && e.key === 'e') { e.preventDefault();
                    App.exportPNG(); }
                if (e.ctrlKey && e.key === 'Delete') { e.preventDefault();
                    App.clearSlide(); }
                if (e.code === 'Space' && !e.repeat && S.mode === 'canvas') { e.preventDefault();
                    S.spaceDown = true;
                    updateCursor(); }
                if (document.activeElement?.contentEditable === 'true') return;
                if (document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName ===
                    'TEXTAREA') return;
                const map = { b: 'brush', e: 'eraser', g: 'fill', s: 'shapes', t: 'text', v: 'viewer' };
                if (map[e.key] && !e.ctrlKey && !e.metaKey) { e.preventDefault(); if (e.key === 's') {
                        const rect = shapesBtn.getBoundingClientRect();
                        shapesDropdown.style.left = (rect.right + 6) + 'px';
                        shapesDropdown.style.top = (rect.top + rect.height / 2) + 'px';
                        shapesDropdown.style.transform = 'translateY(-50%)';
                        shapesDropdown.classList.toggle('open');
                        setTool('shapes'); } else setTool(map[e.key]); }
            });
            document.addEventListener('keyup', e => { if (e.code === 'Space') { S.spaceDown = false;
                    updateCursor(); } });
            canvas.addEventListener('wheel', e => { if (e.ctrlKey) { e.preventDefault();
                    setZoom(S.zoom - e.deltaY * 0.005); } }, { passive: false });

            // ---- UI BINDINGS ----
            modeBtns.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
            toolBtns.forEach(b => b.addEventListener('click', () => {
                if (b.dataset.tool === 'shapes') {
                    const rect = b.getBoundingClientRect();
                    shapesDropdown.style.left = (rect.right + 6) + 'px';
                    shapesDropdown.style.top = (rect.top + rect.height / 2) + 'px';
                    shapesDropdown.style.transform = 'translateY(-50%)';
                    shapesDropdown.classList.toggle('open');
                    setTool('shapes');
                    return;
                }
                setTool(b.dataset.tool);
            }));
            $$('.shape-option').forEach(b => b.addEventListener('click', () => { S.shapeType = b.dataset.shape;
                shapesDropdown.classList.remove('open');
                setTool('shapes'); }));
            document.addEventListener('click', e => { if (!shapesDropdown.contains(e.target) && e.target !==
                    shapesBtn && !shapesBtn.contains(e.target)) shapesDropdown.classList.remove('open'); });
            brushSlider.addEventListener('input', () => { S.brushSize = +brushSlider.value;
                brushVal.textContent = brushSlider.value; });
            colorPicker.addEventListener('input', () => { S.color = colorPicker.value;
                colorDot.style.background = S.color; });
            textTitle.addEventListener('input', () => { currentSlide().title = textTitle.value;
                saveToDisk();
                renderSlides(); });
            textBody.addEventListener('input', () => { currentSlide().body = textBody.value;
                saveToDisk(); });
            window.addEventListener('resize', () => { resizeCanvas();
                updateViewerPos();
                updateTextPositions(); });

            // ---- INIT ----
            function boot() {
                loadFromDisk();
                if (!S.slides.length) { S.slides = [newSlide()];
                    S.currentIndex = 0; }
                resizeCanvas();
                renderSlides();
                loadSlide(S.currentIndex);
                setMode('canvas');
                setTool('brush');
                brushSlider.value = S.brushSize;
                brushVal.textContent = S.brushSize;
                colorPicker.value = S.color;
                colorDot.style.background = S.color;
                zoomBadge.textContent = '100%';
                saveCanvas();
                saveToDisk();
                markSaved();
                console.log('%cVa%c Storyboard Tool %c— all features ready',
                    'font-weight:700;color:#7b6cf6;font-size:15px;',
                    'color:#e8e8ed;font-size:13px;', 'color:#8e8e96;font-size:11px;');
            }
            boot();
            window.App = App;
        })();
    </script>
</body>
</html>
